name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4"]
        rails: ["7.1", "7.2", "8.0"]
        exclude:
          - ruby: "3.2"
            rails: "8.0"

    name: Ruby ${{ matrix.ruby }} / Rails ${{ matrix.rails }}

    env:
      RAILS_VERSION: ${{ matrix.rails }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run specs
        run: bundle exec rspec

      - name: Run RuboCop
        run: bundle exec rubocop --parallel
        if: matrix.ruby == '3.3' && matrix.rails == '8.0'

  publish:
    needs: test
    runs-on: ubuntu-latest
    name: Publish to RubyGems + GitHub Release

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Verify tag matches gem version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          GEM_VERSION=$(ruby -r ./lib/rails_ai_context/version -e "puts RailsAiContext::VERSION")
          if [ "$TAG_VERSION" != "$GEM_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match gem version ($GEM_VERSION)"
            exit 1
          fi
          echo "Version verified: $GEM_VERSION"

      - name: Check if gem version already published
        id: check_gem
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if gem search rails-ai-context --exact --versions | grep -q "$VERSION"; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Gem v$VERSION already on RubyGems — skipping push"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push to RubyGems
        if: steps.check_gem.outputs.already_published == 'false'
        uses: rubygems/release-gem@v1

      - name: Build gem for release asset
        run: gem build rails-ai-context.gemspec

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          # Extract this version's changelog section
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}. See [CHANGELOG.md](CHANGELOG.md) for details."
          fi

          # Check if release already exists (e.g., re-tag or manually created)
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, updating"
            gh release edit "$TAG" --notes "$NOTES" --draft=false
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$NOTES" \
              *.gem
          fi

      - name: Upload mcpb to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Download mcpb from the initial release that created it
          gh release download v0.7.1 --pattern "rails-ai-context-mcp.mcpb" --dir .
          gh release upload "$TAG" rails-ai-context-mcp.mcpb --clobber

  mcp-registry:
    needs: publish
    runs-on: ubuntu-latest
    name: Publish to MCP Registry

    steps:
      - uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Login via GitHub OIDC
        run: mcp-publisher login github-oidc

      - name: Update server.json version, mcpb URL, and fileSha256
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          TAG="${GITHUB_REF#refs/tags/}"
          MCPB_URL="https://github.com/crisnahine/rails-ai-context/releases/download/${TAG}/rails-ai-context-mcp.mcpb"

          # Download mcpb from the release and compute its SHA256
          gh release download "$TAG" --pattern "rails-ai-context-mcp.mcpb" --dir /tmp
          SHA256=$(sha256sum /tmp/rails-ai-context-mcp.mcpb | awk '{print $1}')
          echo "Computed fileSha256: $SHA256"

          jq --arg v "$VERSION" --arg url "$MCPB_URL" --arg sha "$SHA256" \
            '.version = $v | .packages[0].identifier = $url | .packages[0].fileSha256 = $sha' \
            server.json > server.tmp && mv server.tmp server.json
          echo "Publishing version $VERSION to MCP Registry"
          cat server.json

      - name: Publish to MCP Registry
        run: mcp-publisher publish
