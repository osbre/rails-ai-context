name: Bug Report
description: Report a bug in rails-ai-context
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: Gem version
      description: Output of `bundle show rails-ai-context` or check your Gemfile.lock
      placeholder: "4.3.2"
    validations:
      required: true

  - type: dropdown
    id: ruby-version
    attributes:
      label: Ruby version
      options:
        - "3.2"
        - "3.3"
        - "3.4"
        - Other
    validations:
      required: true

  - type: dropdown
    id: rails-version
    attributes:
      label: Rails version
      options:
        - "7.1"
        - "7.2"
        - "8.0"
        - Other
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport mode
      options:
        - stdio (default)
        - HTTP
        - CLI only
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any error messages, stack traces, or MCP output.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — screenshots, config, database adapter, AI client used, etc.
